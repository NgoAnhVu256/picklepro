# Nginx config cho picklepro.vn
# File: /etc/nginx/sites-available/picklepro.vn
# Setup: sudo ln -s /etc/nginx/sites-available/picklepro.vn /etc/nginx/sites-enabled/

limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/m;
limit_req_zone $binary_remote_addr zone=web_limit:10m rate=200r/s;

upstream nextjs {
    server 127.0.0.1:3000;
    keepalive 64;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name picklepro.vn www.picklepro.vn;
    return 301 https://picklepro.vn$request_uri;
}

# www → non-www redirect
server {
    listen 443 ssl http2;
    server_name www.picklepro.vn;
    ssl_certificate     /etc/letsencrypt/live/picklepro.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/picklepro.vn/privkey.pem;
    return 301 https://picklepro.vn$request_uri;
}

# Main server
server {
    listen 443 ssl http2;
    server_name picklepro.vn;

    # SSL
    ssl_certificate     /etc/letsencrypt/live/picklepro.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/picklepro.vn/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # Security Headers
    server_tokens off;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml font/woff2;

    # Next.js static files (cache 1 năm)
    location /_next/static/ {
        proxy_pass http://nextjs;
        add_header Cache-Control "public, max-age=31536000, immutable";
        proxy_set_header Host $host;
    }

    # Public files
    location /favicon.ico {
        proxy_pass http://nextjs;
        add_header Cache-Control "public, max-age=86400";
    }

    # API routes (rate limited)
    location /api/ {
        limit_req zone=api_limit burst=30 nodelay;
        limit_req_status 429;
        proxy_pass http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 30s;
    }

    # All pages
    location / {
        limit_req zone=web_limit burst=200 nodelay;
        proxy_pass http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # Block sensitive files và Vercel endpoints (không dùng nữa)
    location ~ /\.env        { return 404; }
    location ~ /\.git        { return 404; }
    location ~ \.(sql|log)$  { return 404; }
    location /_vercel/       { return 404; }   # Block Vercel analytics calls
}
