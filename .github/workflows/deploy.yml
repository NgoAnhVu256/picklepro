name: 🚀 Deploy to VPS (picklepro.vn)

on:
  push:
    branches: [main]
  workflow_dispatch: 

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🚀 Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}     
          username: ${{ secrets.VPS_USER }} 
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          command_timeout: 12m
          script: |
            set -ex 

            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "🚀 Bắt đầu deploy PicklePro — $(date '+%Y-%m-%d %H:%M:%S %Z')"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

            cd /var/www/picklepro

            echo "📥 Pulling latest code..."
            git fetch --all
            git reset --hard origin/main

            echo "📦 Installing dependencies..."
            pnpm install --no-frozen-lockfile

            echo "🔨 Building Next.js..."
            pnpm build

            echo "📋 Copying static files to standalone..."
            cp -r ./front-end/.next/static ./front-end/.next/standalone/.next/static 2>/dev/null || true
            cp -r ./front-end/public ./front-end/.next/standalone/public 2>/dev/null || true

            echo "♻️  Reloading PM2 (zero-downtime)..."
            pm2 reload picklepro --update-env

            echo "🧹 Cleaning old Next.js cache..."
            find ./front-end/.next/cache -name "*.pack" -mtime +7 -delete 2>/dev/null || true

            echo "✅ Deploy hoàn thành!"
            pm2 list

      # ──────────────────────────────────────────────
      # 3. Thông báo kết quả ra GitHub Summary
      # ──────────────────────────────────────────────
      - name: 📝 Update GitHub Summary
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "## 🎉 Deploy THÀNH CÔNG!" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ Deploy THẤT BẠI!" >> $GITHUB_STEP_SUMMARY
          fi
          echo "- **Repo**: ${{ github.repository }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: https://picklepro.vn" >> $GITHUB_STEP_SUMMARY

      # ──────────────────────────────────────────────
      # 4. Gửi Email (Cả khi thành công và thất bại)
      # ──────────────────────────────────────────────
      - name: 📧 Send Email Notification
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          # Đổi subject dựa trên trạng thái
          subject: "${{ job.status == 'success' && '✅' || '❌' }} PicklePro Deploy ${{ job.status == 'success' && 'Thành Công' || 'Thất Bại' }} — ${{ github.ref_name }}"
          to: ${{ secrets.DEPLOY_NOTIFY_EMAIL }}
          from: "PicklePro CI/CD <${{ secrets.SMTP_USERNAME }}>"
          body: |
            Kết quả Deploy: ${{ job.status == 'success' && 'THÀNH CÔNG 🎉' || 'THẤT BẠI ❌' }}

            📦 Repository: ${{ github.repository }}
            🌿 Branch: ${{ github.ref_name }}
            🔗 Commit: ${{ github.sha }}
            👤 By: ${{ github.actor }}
            🌐 URL: https://picklepro.vn
            🕐 Time: $(date '+%Y-%m-%d %H:%M:%S')

            ---
            ${{ job.status == 'failure' && 'Vũ ơi, kiểm tra ngay logs trên GitHub Actions nhé!' || 'Mọi thứ đều ổn áp!' }}